<svg viewBox="0 0 680 575" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>货架在地图坐标系中的朝向定义</title>
  <desc>俯视图——展示货架在地图XY坐标系中的四种摆放朝向（0°/90°/±180°/-90°），货架矩形随角度旋转，0°边始终为底部长边</desc>
  <defs>
    <marker id="ax" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#333333" stroke-width="1.6"/>
    </marker>
    <marker id="ar" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M1 2L9 5L1 8" fill="#333333" stroke="#333333" stroke-width="2.2"/>
    </marker>
  </defs>

  <!-- 全局坐标轴 -->
  <line x1="60" y1="520" x2="650" y2="520" stroke="#333333" stroke-width="1.8" marker-end="url(#ax)"/>
  <line x1="90" y1="550" x2="90" y2="50" stroke="#333333" stroke-width="1.8" marker-end="url(#ax)"/>
  <text x="85" y="38" text-anchor="middle" font-size="14" font-family="sans-serif" fill="#333333">Y</text>
  <text x="662" y="525" text-anchor="start" font-size="14" font-family="sans-serif" fill="#333333">X</text>

  <!-- ========== 面板1: 0° 摆放（矩形水平，0°边朝右→X+）========== -->
  <g transform="translate(230, 190)">
    <!-- 货架矩形（宽=140长边，高=54短边） -->
    <rect x="-70" y="-27" width="140" height="54" rx="1" fill="#FAFAF8" stroke="#333333" stroke-width="1.8"/>
    <!-- 0°边在底部（长边），箭头从底部指向右 -->
    <line x1="-40" y1="27" x2="55" y2="27" stroke="#333333" stroke-width="2.5" marker-end="url(#ar)" stroke-linecap="round"/>
    <text x="-5" y="43" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#555555">0°边→</text>
    <text x="0" y="-40" text-anchor="middle" font-size="13" font-weight="600" font-family="sans-serif" fill="#222222">货架 0°</text>
    <text x="0" y="75" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#555555">0°（0°边→X+）</text>
  </g>

  <!-- ========== 面板2: 90° 摆放（矩形旋转90°，0°边朝上→Y+）========== -->
  <g transform="translate(500, 190)">
    <!-- 货架矩形旋转90度，缩短视觉高度 -->
    <g transform="rotate(-90)">
      <rect x="-55" y="-20" width="110" height="40" rx="1" fill="#FAFAF8" stroke="#333333" stroke-width="1.8"/>
      <!-- 0°边在底部，箭头从底部指向右 -->
      <line x1="-30" y1="20" x2="40" y2="20" stroke="#333333" stroke-width="2.5" marker-end="url(#ar)" stroke-linecap="round"/>
    </g>
    <!-- 标注 （在地图坐标中0°边朝上）-->
    <text x="26" y="-42" text-anchor="start" font-size="11" font-family="sans-serif" fill="#555555">→ 0°边</text>
    <text x="0" y="82" text-anchor="middle" font-size="13" font-weight="600" font-family="sans-serif" fill="#222222">货架 90°</text>
    <text x="0" y="112" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#555555">90°（0°边→Y+）</text>
  </g>

  <!-- ========== 面板3: ±180° 摆放（矩形旋转180°，0°边朝左→X-）========== -->
  <g transform="translate(230, 400)">
    <g transform="rotate(-180)">
      <rect x="-70" y="-27" width="140" height="54" rx="1" fill="#FAFAF8" stroke="#333333" stroke-width="1.8"/>
      <line x1="-40" y1="27" x2="55" y2="27" stroke="#333333" stroke-width="2.5" marker-end="url(#ar)" stroke-linecap="round"/>
    </g>
    <text x="-20" y="-35" text-anchor="end" font-size="11" font-family="sans-serif" fill="#555555">← 0°边</text>
    <text x="0" y="75" text-anchor="middle" font-size="13" font-weight="600" font-family="sans-serif" fill="#222222">货架 ±180°</text>
    <text x="0" y="105" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#555555">±180°（0°边→X-）</text>
  </g>

  <!-- ========== 面板4: -90° 摆放（矩形旋转270°，0°边朝下→Y-）========== -->
  <g transform="translate(500, 400)">
    <g transform="rotate(-270)">
      <rect x="-55" y="-20" width="110" height="40" rx="1" fill="#FAFAF8" stroke="#333333" stroke-width="1.8"/>
      <line x1="-30" y1="20" x2="40" y2="20" stroke="#333333" stroke-width="2.5" marker-end="url(#ar)" stroke-linecap="round"/>
    </g>
    <text x="-26" y="42" text-anchor="end" font-size="11" font-family="sans-serif" fill="#555555">→ 0°边</text>
    <text x="0" y="75" text-anchor="middle" font-size="13" font-weight="600" font-family="sans-serif" fill="#222222">货架 -90°</text>
    <text x="0" y="105" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#555555">-90°（0°边→Y-）</text>
  </g>

  <!-- 底部备注 -->
  <rect x="120" y="535" width="440" height="26" rx="8" fill="#F1EFE8" stroke="#B4B2A9" stroke-width="0.8"/>
  <text x="340" y="552" text-anchor="middle" font-size="11.5" font-family="sans-serif" fill="#555555">俯视图 — 货架 0° 边指向地图方向，即为货架摆放角度</text>
</svg>
