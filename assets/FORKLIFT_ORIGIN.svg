<svg viewBox="45 20 310 310" xmlns="http://www.w3.org/2000/svg" role="img">
  <title>叉车设备坐标系原点——两个后轮中心</title>
  <desc>叉车俯视图，X轴朝上（前进方向），Y轴朝左，右手坐标系，后轮中心连线中点为设备原点（旋转中心）</desc>
  <defs>
    <marker id="ax" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto">
      <path d="M2 1L8 5L2 9" fill="none" stroke="#333333" stroke-width="1.6"/>
    </marker>
  </defs>

  <!-- 叉车车身 -->
  <rect x="90" y="60" width="200" height="80" rx="8" fill="#F2F2F2" stroke="#333333" stroke-width="2"/>

  <!-- 叉齿 -->
  <rect x="105" y="140" width="36" height="100" rx="3" fill="#F2F2F2" stroke="#333333" stroke-width="2"/>
  <rect x="240" y="140" width="36" height="100" rx="3" fill="#F2F2F2" stroke="#333333" stroke-width="2"/>

  <!-- 后轮（左） -->
  <circle cx="123" cy="212" r="9" fill="#999999" stroke="#555555" stroke-width="1.5"/>
  <!-- 前轮（右） -->
  <circle cx="258" cy="212" r="9" fill="#999999" stroke="#555555" stroke-width="1.5"/>

  <!-- 两轮中心红色虚线 -->
  <line x1="123" y1="212" x2="258" y2="212" stroke="#D43900" stroke-width="1.8" stroke-dasharray="5,4"/>

  <!-- 原点（两个轮子中心连线的中点） -->
  <circle cx="190" cy="212" r="6" fill="#D43900" stroke="#AA2200" stroke-width="1.5"/>
  <circle cx="190" cy="212" r="2.5" fill="#FFFFFF"/>

  <!-- 设备坐标系（右手坐标系） -->
  <!-- X轴 ↑ 向上（前进方向） -->
  <line x1="190" y1="212" x2="190" y2="40" stroke="#2563EB" stroke-width="2.2" marker-end="url(#ax)"/>
  <text x="195" y="33" text-anchor="start" font-size="14" font-family="sans-serif" fill="#2563EB" font-weight="600">X</text>

  <!-- Y轴 ← 向左 -->
  <line x1="190" y1="212" x2="60" y2="212" stroke="#2563EB" stroke-width="2.2" marker-end="url(#ax)"/>
  <text x="53" y="216" text-anchor="end" font-size="14" font-family="sans-serif" fill="#2563EB" font-weight="600">Y</text>

  <!-- 原点标记 -->
  <text x="190" y="240" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#D43900">设备原点</text>
  <text x="190" y="255" text-anchor="middle" font-size="11" font-family="sans-serif" fill="#D43900">（两个后轮中心/旋转中心）</text>

  <!-- 说明 -->
  <text x="190" y="300" text-anchor="middle" font-size="12" font-family="sans-serif" fill="#555555">叉车 俯视图（右手坐标系 — X ↑ 前进方向，Y ←）</text>
</svg>
